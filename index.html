<!DOCTYPE html>
<html>
<head>
<title>AWS Dynamic Website</title>
</head>

<body>

<h1>AWS Serverless Website</h1>

<button onclick="callAPI()">Get Message</button>

<p id="output"></p>

<script>

async function callAPI() {

    const response = await fetch("https://892rdvpxag.execute-api.us-east-1.amazonaws.com/hello");
    const data = await response.json();

    document.getElementById("output").innerText = data.message;

}

</script>

</body>
</html>
